<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCYU</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">

<script type="module">
import { initializeApp }                         from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth,
         createUserWithEmailAndPassword,
         signInWithEmailAndPassword,
         onAuthStateChanged, signOut }            from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, collection, doc,
         setDoc, updateDoc, deleteDoc, onSnapshot,
         increment, serverTimestamp,
         query, orderBy }                        from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
import { getStorage, ref as sref,
         uploadBytesResumable, getDownloadURL,
         deleteObject }                          from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

const firebaseConfig = {
  apiKey: "AIzaSyA-AfoXK81MnOxSxglADrwXRrAWqBBP0Ag",
  authDomain: "ginga-f17c1.firebaseapp.com",
  projectId: "ginga-f17c1",
  storageBucket: "ginga-f17c1.firebasestorage.app",
  messagingSenderId: "676700405698",
  appId: "1:676700405698:web:b868d38c01e343139b205b",
  measurementId: "G-MG34DCBCQG"
};

const app     = initializeApp(firebaseConfig);
const auth    = getAuth(app);
const db      = getFirestore(app);
const storage = getStorage(app);

onAuthStateChanged(auth, user => {
  window.__currentUid = user ? user.uid : null;
  window.__loggedIn   = !!user;
  updateAuthUI(user);
  if (!window.__fbReady) loadVideos();
});

function updateAuthUI(user) {
  const btn = document.getElementById('nav-mypage');
  if (!btn) return;
  if (user) {
    btn.querySelector('span').textContent = 'マイページ';
    btn.querySelector('i').className = 'ti ti-user-check';
  } else {
    btn.querySelector('span').textContent = 'ログイン';
    btn.querySelector('i').className = 'ti ti-login';
  }
}

async function loadVideos() {
  window.__fbReady = true;
  document.getElementById('fb-dot').classList.add('on');
  const q = query(collection(db, 'videos'), orderBy('createdAt', 'desc'));
  onSnapshot(q, s => {
    window.__VIDS = s.docs.map(d => ({ id: d.id, ...d.data() }));
    buildFeed(window.__VIDS);
  }, () => buildFeed([]));
}

window.fbLike = async (id, add) => {
  if (!window.__fbReady) return;
  await updateDoc(doc(db, 'videos', id), { likes: increment(add ? 1 : -1) });
};
window.fbFollow = async (id, add) => {
  if (!window.__fbReady || !window.__currentUid) return;
  const ref = doc(db, 'users', window.__currentUid, 'following', id);
  if (add) await setDoc(ref, { at: serverTimestamp() });
  else     await deleteDoc(ref);
};
window.fbDelete = async (videoId, videoURL) => {
  if (!window.__fbReady || !window.__currentUid) return;
  await deleteDoc(doc(db, 'videos', videoId));
  if (videoURL) { try { await deleteObject(sref(storage, videoURL)); } catch(_) {} }
};
window.fbSignUp = async (email, password) => {
  const cred = await createUserWithEmailAndPassword(auth, email, password);
  return cred.user;
};
window.fbSignIn = async (email, password) => {
  const cred = await signInWithEmailAndPassword(auth, email, password);
  return cred.user;
};
window.fbSignOut = async () => { await signOut(auth); };

window.fbUpload = (file, caption, onProg, onDone, onErr) => {
  if (!window.__fbReady)    { onErr('Firebase 未設定'); return; }
  if (!window.__currentUid) { onErr('ログインが必要です'); return; }
  const uid  = window.__currentUid;
  const path = `videos/${uid}_${Date.now()}.${file.name.split('.').pop()}`;
  const task = uploadBytesResumable(sref(storage, path), file);
  task.on('state_changed',
    s => onProg(Math.round(s.bytesTransferred / s.totalBytes * 100)),
    e => onErr(e.message),
    async () => {
      const url  = await getDownloadURL(task.snapshot.ref);
      const tags = (caption || '').match(/#[\w\u3000-\u9fff]+/g) || [];
      await setDoc(doc(db, 'videos', `vid_${Date.now()}`), {
        emoji:'🎬', user:`user_${uid.slice(0,6)}`, av:'ME',
        col: Math.floor(Math.random()*5),
        title: caption || '新しい動画', tags, likes:0, comments:0, shares:0,
        music:'Original Sound', videoURL: url,
        uid: uid, createdAt: serverTimestamp()
      });
      onDone(url);
    }
  );
};
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

}

.search-btn {

/* ── VIDEO CARD ── */

/* card info */

/* ── DEL DIALOG ── */
#del-dialog {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(0,0,0,0.72);
  display: none; align-items: center; justify-content: center; padding: 24px;
}
#del-dialog.open { display: flex; }
.del-box {
  width: 100%; max-width: 300px;
  background: var(--surface); border-radius: 12px;
  padding: 24px 20px 20px;
  border: 1px solid var(--border); text-align: center;
}
.del-icon { font-size: 36px; color: var(--red); margin-bottom: 10px; }
.del-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
.del-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
.del-actions { display: flex; gap: 10px; }
.del-cancel {
  flex: 1; background: rgba(255,255,255,0.07);
  border: 1px solid var(--border);
  border-radius: 6px; color: var(--text);
  font-size: 14px; font-weight: 700; font-family: inherit;
  padding: 12px; cursor: pointer;
}
.del-confirm {
  flex: 1; background: var(--red); border: none;
  border-radius: 6px; color: #fff;
  font-size: 14px; font-weight: 700; font-family: inherit;
  padding: 12px; cursor: pointer;
}

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: calc(var(--nav-h) + 12px + env(safe-area-inset-bottom, 0px));
  left: 50%; transform: translateX(-50%) translateY(14px);
  background: rgba(30,30,30,0.98); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; padding: 9px 20px;
  border-radius: 6px; z-index: 999;
  opacity: 0; transition: all .28s; pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadein { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
.vcard { animation: fadein .3s ease both; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="logo-wrap">
      <span class="logo-text">UCYU</span>
      <div id="fb-dot"></div>
    </div>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="検索" oninput="filterFeed(this.value)">
      <button class="search-btn"><i class="ti ti-search"></i></button>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="openUpload()" title="動画を投稿">
        <i class="ti ti-video-plus"></i>
      </button>
      <button class="icon-btn" id="nav-mypage" onclick="openLoginModal()" title="マイページ">
        <i class="ti ti-login"></i>
      </button>
    </div>
  </div>



  <!-- CONTENT -->
  <div id="content">
    <div id="video-grid"></div>
    <div id="empty-state">
      <i class="ti ti-video-off"></i>
      <h3>動画がまだありません</h3>
      <p>右上の＋ボタンから最初の動画を投稿しよう</p>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div id="bottom-nav">
    <button class="bn on"><i class="ti ti-home"></i><span>ホーム</span></button>
    <button class="bn-post" onclick="openUpload()">
      <div class="post-pill"><i class="ti ti-plus"></i></div>
      <span>投稿</span>
    </button>
    <button class="bn" id="nav-mypage-bottom" onclick="openLoginModal()"><i class="ti ti-login"></i><span>アカウント</span></button>
  </div>

</div>

<!-- VIDEO PLAYER MODAL -->
<div id="player-modal">
  <div class="player-box">
    <div class="player-video-wrap" id="player-video-wrap">
      <button class="player-close" onclick="closePlayer()"><i class="ti ti-x"></i></button>
    </div>
    <div class="player-info">
      <div class="player-title" id="player-title"></div>
      <div class="player-meta">
        <div class="player-avatar" id="player-avatar"></div>
        <div>
          <div class="player-channel" id="player-channel"></div>
          <div class="player-sub" id="player-stats"></div>
        </div>
        <div class="player-actions">
          <button class="pact-btn" id="player-like-btn" onclick="playerToggleLike()">
            <i class="ti ti-heart"></i><span id="player-likes">0</span>
          </button>
          <button class="pact-btn" id="player-follow-btn" onclick="playerToggleFollow()">
            <i class="ti ti-user-plus"></i><span>フォロー</span>
          </button>
        </div>
      </div>
      <div class="player-tags" id="player-tags"></div>
      <div class="player-music" id="player-music"></div>
    </div>
  </div>
</div>

<!-- UPLOAD SHEET -->
<div id="upload-sheet">
  <div class="sheet-inner">
    <div class="handle"></div>
    <div class="sheet-title">動画を投稿</div>
    <div class="sheet-sub">UCYU に動画を公開する</div>
    <div class="drop-zone">
      <input type="file" accept="video/*" id="fileInput" onchange="handleFile(event)">
      <i class="ti ti-video-plus"></i>
      <div class="drop-label">クリックして動画を選択</div>
      <div class="drop-hint">500MB まで対応</div>
    </div>
    <div class="err-box" id="errBox"><i class="ti ti-alert-circle"></i><span id="errTxt"></span></div>
    <div class="file-info" id="fileInfo">
      <i class="ti ti-file-check"></i>
      <span class="fn" id="fname"></span>
      <span class="fs" id="fsize"></span>
    </div>
    <textarea class="caption-inp" id="cap" rows="2" placeholder="キャプション（#タグOK）"></textarea>
    <div class="up-prog" id="upProg">
      <div class="up-bar-bg"><div class="up-bar-fill" id="upFill"></div></div>
      <div class="up-pct" id="upPct">0%</div>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="doUpload()">
      <i class="ti ti-upload"></i>アップロード
    </button>
  </div>
</div>

<!-- LOGIN MODAL -->
<div id="login-modal">
  <div class="lm-box">
    <div class="lm-title">UCYU</div>
    <div class="lm-sub" id="lm-sub">UCYUにログイン</div>
    <div class="lm-tabs" id="lm-tabs">
      <button class="lm-tab on" id="tab-login" onclick="switchTab('login')">ログイン</button>
      <button class="lm-tab" id="tab-signup" onclick="switchTab('signup')">新規登録</button>
    </div>
    <input class="lm-inp" type="email" id="lm-email" placeholder="メールアドレス" autocomplete="email">
    <input class="lm-inp" type="password" id="lm-password" placeholder="パスワード（6文字以上）" autocomplete="current-password">
    <div class="lm-err" id="lm-err"></div>
    <button class="lm-btn" id="lm-submit" onclick="doAuth()">
      <i class="ti ti-login"></i><span id="lm-submit-label">ログイン</span>
    </button>
    <button class="lm-logout" id="lm-logout" onclick="doLogout()">
      <i class="ti ti-logout"></i> ログアウト
    </button>
    <button class="lm-close" onclick="closeLoginModal()">キャンセル</button>
  </div>
</div>

<!-- DEL DIALOG -->
<div id="del-dialog">
  <div class="del-box">
    <div class="del-icon"><i class="ti ti-trash"></i></div>
    <div class="del-title">動画を削除しますか？</div>
    <div class="del-sub">削除すると元に戻せません</div>
    <div class="del-actions">
      <button class="del-cancel" onclick="closeDelDialog()">キャンセル</button>
      <button class="del-confirm" id="del-confirm-btn" onclick="confirmDelete()">削除する</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
window.__VIDS    = [];
window.__fbReady = false;

const liked     = new Set();
const following = new Set();
let _activeChip = 'all';
let _searchQ    = '';
let _playerIdx  = -1;

function fmt(n) {
  n = Number(n) || 0;
  if (n >= 10000) return (n / 10000).toFixed(1) + '万';
  if (n >= 1000)  return (n / 1000).toFixed(1) + 'k';
  return String(n);
}

/* ── フィード構築 ── */
function buildFeed(vids) {
  window.__VIDS = vids || [];
  renderGrid();
}

function renderGrid() {
  const grid  = document.getElementById('video-grid');
  const empty = document.getElementById('empty-state');
  const vids  = filterVids(window.__VIDS);

  if (!vids.length) {
    grid.innerHTML = '';
    empty.style.display = 'flex';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = '';
  vids.forEach((v, i) => {
    const lk    = liked.has(v.id ?? String(i));
    const isOwn = window.__currentUid && v.uid === window.__currentUid;
    const card  = document.createElement('div');
    card.className = 'vcard';
    card.style.animationDelay = (i * 0.04) + 's';
    card.innerHTML = `
      <div class="vcard-thumb" onclick="openPlayer(${window.__VIDS.indexOf(v)})">
        ${v.videoURL
          ? `<video src="${v.videoURL}" muted playsinline preload="metadata" onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0"></video>`
          : `<div class="thumb-emoji">${v.emoji || '🎬'}</div>`}
        <div class="vcard-play-overlay">
          <div class="play-circle"><i class="ti ti-player-play-filled"></i></div>
        </div>
        <div class="vcard-duration">動画</div>
        ${isOwn ? `<div class="vcard-own-badge">自分</div>` : ''}
        ${isOwn ? `<button class="vcard-delete" onclick="event.stopPropagation();openDelDialog('${v.id}','${v.videoURL||''}')"><i class="ti ti-trash"></i></button>` : ''}
      </div>
      <div class="vcard-info">
        <div class="vcard-avatar">${v.av || '?'}</div>
        <div class="vcard-meta">
          <div class="vcard-title">${v.title || '無題'}</div>
          <div class="vcard-channel">@${v.user || 'unknown'}</div>
          <div class="vcard-stats">
            <span><i class="ti ti-heart" style="font-size:12px;color:${lk?'#FF0000':'inherit'}"></i> ${fmt(lk ? v.likes+1 : v.likes)}</span>
            ${(v.tags||[]).slice(0,2).map(t=>`<span class="vcard-tag">${t}</span>`).join('')}
          </div>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function filterVids(vids) {
  let out = vids;
  if (_activeChip !== 'all') {
    out = out.filter(v => {
      const haystack = ((v.title||'') + ' ' + (v.tags||[]).join(' ') + ' ' + (v.music||'')).toLowerCase();
      return haystack.includes(_activeChip);
    });
  }
  if (_searchQ) {
    const q = _searchQ.toLowerCase();
    out = out.filter(v => {
      const haystack = ((v.title||'') + ' ' + (v.user||'') + ' ' + (v.tags||[]).join(' ')).toLowerCase();
      return haystack.includes(q);
    });
  }
  return out;
}

function setChip(el, val) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  _activeChip = val;
  renderGrid();
}

function filterFeed(q) {
  _searchQ = q.trim();
  renderGrid();
}

/* ── PLAYER ── */
let _playerVid = null;

function openPlayer(idx) {
  const v = window.__VIDS[idx];
  if (!v) return;
  _playerIdx = idx;

  const wrap = document.getElementById('player-video-wrap');
  // clear previous
  const prev = wrap.querySelector('video, .player-emoji');
  if (prev) prev.remove();

  if (v.videoURL) {
    const vid = document.createElement('video');
    vid.src = v.videoURL; vid.controls = true; vid.autoplay = true;
    vid.loop = true; vid.style.cssText = 'width:100%;height:100%;object-fit:contain;';
    wrap.insertBefore(vid, wrap.querySelector('.player-close'));
    _playerVid = vid;
  } else {
    const em = document.createElement('div');
    em.className = 'player-emoji'; em.textContent = v.emoji || '🎬';
    wrap.insertBefore(em, wrap.querySelector('.player-close'));
    _playerVid = null;
  }

  document.getElementById('player-title').textContent = v.title || '無題';
  document.getElementById('player-avatar').textContent = v.av || '?';
  document.getElementById('player-channel').textContent = '@' + (v.user || 'unknown');
  document.getElementById('player-stats').textContent = fmt(liked.has(v.id ?? String(idx)) ? v.likes+1 : v.likes) + ' いいね';

  const likeBtn = document.getElementById('player-like-btn');
  document.getElementById('player-likes').textContent = fmt(liked.has(v.id ?? String(idx)) ? v.likes+1 : v.likes);
  likeBtn.classList.toggle('liked', liked.has(v.id ?? String(idx)));

  const followBtn = document.getElementById('player-follow-btn');
  followBtn.querySelector('span').textContent = following.has(v.id ?? String(idx)) ? 'フォロー中' : 'フォロー';

  const tagsEl = document.getElementById('player-tags');
  tagsEl.innerHTML = (v.tags||[]).map(t=>`<span class="player-tag">${t}</span>`).join('');

  document.getElementById('player-music').innerHTML = v.music
    ? `<i class="ti ti-disc"></i>${v.music}` : '';

  document.getElementById('player-modal').classList.add('open');
}

function closePlayer() {
  if (_playerVid) { _playerVid.pause(); }
  document.getElementById('player-modal').classList.remove('open');
  _playerIdx = -1; _playerVid = null;
}

function playerToggleLike() {
  const v   = window.__VIDS[_playerIdx]; if (!v) return;
  const id  = v.id ?? String(_playerIdx);
  const btn = document.getElementById('player-like-btn');
  const cnt = document.getElementById('player-likes');
  if (liked.has(id)) {
    liked.delete(id); btn.classList.remove('liked'); cnt.textContent = fmt(v.likes);
    window.fbLike && window.fbLike(id, false);
  } else {
    liked.add(id); btn.classList.add('liked'); cnt.textContent = fmt(v.likes + 1);
    window.fbLike && window.fbLike(id, true);
  }
  renderGrid();
}

function playerToggleFollow() {
  const v   = window.__VIDS[_playerIdx]; if (!v) return;
  const id  = v.id ?? String(_playerIdx);
  const btn = document.getElementById('player-follow-btn');
  if (following.has(id)) {
    following.delete(id); btn.querySelector('span').textContent = 'フォロー';
    window.fbFollow && window.fbFollow(id, false);
    showToast('フォロー解除しました');
  } else {
    following.add(id); btn.querySelector('span').textContent = 'フォロー中';
    window.fbFollow && window.fbFollow(id, true);
    showToast('フォローしました ✓');
  }
}

// close modal on backdrop click
document.getElementById('player-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('player-modal')) closePlayer();
});

/* ── Upload ── */
function openUpload() {
  if (!window.__loggedIn) { openLoginModal(true); return; }
  _openUploadSheet();
}
function _openUploadSheet() {
  document.getElementById('upload-sheet').classList.add('open');
  ['errBox','fileInfo','upProg'].forEach(id => document.getElementById(id).classList.remove('show'));
  document.getElementById('cap').value = '';
  document.getElementById('fileInput').value = '';
  const btn = document.getElementById('submitBtn');
  btn.disabled = false; btn.innerHTML = '<i class="ti ti-upload"></i>アップロード'; btn.style.background = '';
}
document.getElementById('upload-sheet').addEventListener('click', e => {
  if (e.target === document.getElementById('upload-sheet'))
    document.getElementById('upload-sheet').classList.remove('open');
});
function handleFile(e) {
  const file = e.target.files[0]; if (!file) return;
  document.getElementById('errBox').classList.remove('show');
  document.getElementById('fileInfo').classList.remove('show');
  if (file.size > 500 * 1024 * 1024) {
    document.getElementById('errTxt').textContent = `500MBを超えています（${(file.size/1024/1024).toFixed(0)}MB）`;
    document.getElementById('errBox').classList.add('show'); return;
  }
  document.getElementById('fname').textContent = file.name;
  document.getElementById('fsize').textContent = (file.size/1024/1024).toFixed(2) + ' MB';
  document.getElementById('fileInfo').classList.add('show');
}
function doUpload() {
  const fi  = document.getElementById('fileInput');
  const btn = document.getElementById('submitBtn');
  if (!fi.files[0]) {
    document.getElementById('errTxt').textContent = '動画を選択してください';
    document.getElementById('errBox').classList.add('show'); return;
  }
  document.getElementById('errBox').classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> アップロード中…';
  const fill = document.getElementById('upFill');
  const pct  = document.getElementById('upPct');
  document.getElementById('upProg').classList.add('show');
  const onProg = p => { fill.style.width = p + '%'; pct.textContent = p + '%'; };
  const onDone = () => {
    btn.innerHTML = '<i class="ti ti-check"></i> 投稿完了！';
    btn.style.background = '#22c55e';
    showToast('🎉 投稿しました！');
    setTimeout(() => document.getElementById('upload-sheet').classList.remove('open'), 1400);
  };
  const onErr = msg => {
    document.getElementById('upProg').classList.remove('show');
    btn.disabled = false; btn.innerHTML = '<i class="ti ti-upload"></i>アップロード'; btn.style.background = '';
    document.getElementById('errTxt').textContent = 'エラー: ' + msg;
    document.getElementById('errBox').classList.add('show');
  };
  if (window.__fbReady && window.fbUpload) {
    window.fbUpload(fi.files[0], document.getElementById('cap').value, onProg, onDone, onErr);
  } else {
    let p = 0;
    const t = setInterval(() => {
      p = Math.min(p + 8, 100); onProg(p);
      if (p >= 100) { clearInterval(t); onDone(); showToast('デモ: Firebase設定後に実際に保存されます'); }
    }, 160);
  }
}

/* ── Login ── */
let _loginFromUpload = false;
let _lmTab = 'login';
function openLoginModal(fromUpload = false) {
  _loginFromUpload = fromUpload;
  const modal  = document.getElementById('login-modal');
  const sub    = document.getElementById('lm-sub');
  const tabs   = document.getElementById('lm-tabs');
  const submit = document.getElementById('lm-submit');
  const logout = document.getElementById('lm-logout');
  document.getElementById('lm-err').classList.remove('show');
  document.getElementById('lm-email').value    = '';
  document.getElementById('lm-password').value = '';
  if (window.__loggedIn) {
    sub.textContent      = 'ログイン中です';
    tabs.style.display   = 'none';
    submit.style.display = 'none';
    logout.classList.add('show');
  } else {
    sub.textContent      = fromUpload ? '投稿するにはログインが必要です' : 'UCYUにログイン';
    tabs.style.display   = '';
    submit.style.display = '';
    logout.classList.remove('show');
    switchTab('login');
  }
  modal.classList.add('open');
}
function closeLoginModal() { document.getElementById('login-modal').classList.remove('open'); }
function switchTab(tab) {
  _lmTab = tab;
  document.getElementById('tab-login').classList.toggle('on', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('on', tab === 'signup');
  document.getElementById('lm-submit-label').textContent = tab === 'login' ? 'ログイン' : '新規登録';
  document.getElementById('lm-err').classList.remove('show');
}
async function doAuth() {
  const email    = document.getElementById('lm-email').value.trim();
  const password = document.getElementById('lm-password').value;
  const errEl    = document.getElementById('lm-err');
  const btn      = document.getElementById('lm-submit');
  errEl.classList.remove('show');
  if (!email || !password) { errEl.textContent = 'メールアドレスとパスワードを入力してください'; errEl.classList.add('show'); return; }
  btn.disabled = true;
  try {
    if (_lmTab === 'login') { await window.fbSignIn(email, password); showToast('ログインしました ✓'); }
    else                    { await window.fbSignUp(email, password); showToast('登録しました ✓'); }
    closeLoginModal();
    if (_loginFromUpload) setTimeout(_openUploadSheet, 200);
  } catch(e) {
    const msgs = {
      'auth/user-not-found':      'メールアドレスが見つかりません',
      'auth/wrong-password':      'パスワードが正しくありません',
      'auth/email-already-in-use':'このメールアドレスは既に使用されています',
      'auth/invalid-email':       '有効なメールアドレスを入力してください',
      'auth/weak-password':       'パスワードは6文字以上にしてください',
      'auth/invalid-credential':  'メールアドレスまたはパスワードが正しくありません',
    };
    errEl.textContent = msgs[e.code] || e.message;
    errEl.classList.add('show');
  } finally { btn.disabled = false; }
}
async function doLogout() { await window.fbSignOut(); closeLoginModal(); showToast('ログアウトしました'); }

/* ── Delete ── */
let _delTarget = { id: null, url: null };
function openDelDialog(id, url) {
  _delTarget = { id, url };
  document.getElementById('del-dialog').classList.add('open');
}
function closeDelDialog() {
  document.getElementById('del-dialog').classList.remove('open');
  _delTarget = { id: null, url: null };
}
async function confirmDelete() {
  const btn = document.getElementById('del-confirm-btn');
  btn.disabled = true; btn.textContent = '削除中…';
  try {
    await window.fbDelete(_delTarget.id, _delTarget.url);
    closeDelDialog(); showToast('🗑️ 動画を削除しました');
  } catch(e) {
    closeDelDialog(); showToast('削除に失敗しました: ' + e.message);
  } finally { btn.disabled = false; btn.textContent = '削除する'; }
}

/* ── Toast ── */
let toastT;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2400);
}

// sync bottom nav mypage icon
function updateAuthUI2(user) {
  const btn = document.getElementById('nav-mypage-bottom');
  if (!btn) return;
  if (user) {
    btn.querySelector('span').textContent = 'マイページ';
    btn.querySelector('i').className = 'ti ti-user-check';
  } else {
    btn.querySelector('span').textContent = 'アカウント';
    btn.querySelector('i').className = 'ti ti-login';
  }
}
const _origUpdate = window.updateAuthUI2;

/* ── 初期描画 ── */
buildFeed([]);
</script>
</body>
</html>
